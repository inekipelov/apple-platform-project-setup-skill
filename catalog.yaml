    recommendation_mode: one_recommended_choice_user_decides
    selection_hints:
      - Resolve the concrete subagent from inventory/subagents.yaml after category selection.
      - Copy only the chosen .toml files into .codex/agents/.
      - Do not install the whole collection.
      - If multiple subagents fit, recommend one best-fit subagent, explain why, and keep the final decision with the user.

  - artifact: sosumi-cli
    applies_to: common
    snippet_paths: []
    prerequisites:
      - user_chose_sosumi_cli_path
      - explicit_confirmation_for_global_install
    install_strategy: propose_global_install_only_after_confirmation
    upstream_sources:
      - https://sosumi.ai
    selection_hints:
      - Optional helper for Apple documentation lookup outside MCP.
      - Do not treat this CLI as required when `sosumi` HTTP MCP already solves the use case.
