version: 1

inventory_refs:
  skills: inventory/skills.yaml
  subagents: inventory/subagents.yaml

artifacts:
  - artifact: superpowers
    applies_to: common
    snippet_paths: []
    prerequisites:
      - git
      - explicit_confirmation_for_user_home_changes
    install_strategy: official_user_level_clone_and_symlink
    upstream_sources:
      - https://github.com/obra/superpowers
      - https://raw.githubusercontent.com/obra/superpowers/refs/heads/main/.codex/INSTALL.md
    selection_hints:
      - Mandatory first step for every workspace setup run.
      - Stop after proposing the install until the user confirms.

  - artifact: agents-bootstrap
    applies_to: common
    snippet_paths:
      - snippets/common/AGENTS.bootstrap.md
    target_path: AGENTS.md
    apply_mode: generate_from_template
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - superpowers_present
      - project_interview_complete
      - selected_skills_and_subagents_installed_or_intentionally_skipped
    install_strategy: copy_and_customize_after_install_selection_is_final
    upstream_sources:
      - https://developers.openai.com/codex/learn/best-practices#turn-repeatable-work-into-skills
      - https://developers.openai.com/codex/config-reference#configtoml
    agents_rendering:
      skill_reference_syntax: "$skill-name"
      subagent_reference_syntax: "@agent-name"
      project_local_skill_path: ".codex/skills/"
      mode: declarative_final_state_only
      require_usage_rule: true
      require_exact_sections:
        - Repository Purpose
        - Agent Personalization
        - Workspace
        - Project Structure Source Of Truth
        - Core Commands
        - Installed Skills
        - Installed Subagents
        - Repository Rules
      personalization_line_prefixes:
        - "- Communication language:"
        - "- Pushback policy:"
        - "- Quality priority:"
        - "- Long-term priority:"
        - "- Temporary fixes policy:"
        - "- Risk disclosure:"
      default_personalization_profile: strict-quality-client-language-default
      canonical_personalization_profiles:
        strict-quality-russian:
          communication_language: "Russian."
          pushback_policy: "Challenge user decisions that introduce hacks, security weaknesses, or long-term technical debt; do not silently agree with them."
          quality_priority: "Favor quality, security, and maintainability over speed."
          long_term_priority: "Prefer scalable and maintainable solutions over short-term speed."
          temporary_fixes_policy: "Do not accept \"temporary\" solutions without an explicit cleanup plan."
          risk_disclosure: "If a risky shortcut is chosen, state the risks explicitly in the final response."
        strict-quality-client-language-default:
          communication_language: "Use the language the client used to contact the agent."
          pushback_policy: "Challenge user decisions that introduce hacks, security weaknesses, or long-term technical debt; do not silently agree with them."
          quality_priority: "Favor quality, security, and maintainability over speed."
          long_term_priority: "Prefer scalable and maintainable solutions over short-term speed."
          temporary_fixes_policy: "Do not accept \"temporary\" solutions without an explicit cleanup plan."
          risk_disclosure: "If a risky shortcut is chosen, state the risks explicitly in the final response."
      installed_skill_line_format: "- $skill-name: Use for <exact repository task>."
      installed_subagent_line_format: "- @agent-name: Use for <exact repository task>."
      empty_section_line: "- None installed."
      commands_section: "Core Commands"
      repository_rules_scope: non_command_repo_policy_only
    selection_hints:
      - Create AGENTS.md after the interview and after the selected skills and subagents are installed or intentionally skipped.
      - Render skill references as $skill-name and subagent references as @agent-name.
      - Render AGENTS.md as a declarative final-state document with fixed section titles and exact line prefixes.
      - Render `Agent Personalization` as a separate section before `Workspace`.
      - Always ask which communication language should be fixed in AGENTS.md.
      - Use the client-language strict-quality fallback profile when the interview does not provide an explicit communication-language choice.
      - List only the final installed skills and subagents. Do not include recommendations, alternatives, or rationale.
      - Render workflow commands only under `Core Commands`.
      - Keep `Repository Rules` limited to non-command repo policy.
      - Do not use first-person wording or the word `Report` in AGENTS.md.
      - Do not duplicate `Agent Personalization` lines in `Repository Rules`.
      - Do not duplicate commands in `Repository Rules`.
      - Use `- None installed.` when a section has no installed project-local entries.

  - artifact: project-codex-config
    applies_to: common
    snippet_paths: []
    prerequisites:
      - project_interview_complete
      - workspace_shape_chosen
    install_strategy: create_or_refine_project_codex_config_toml
    upstream_sources:
      - https://developers.openai.com/codex/config-reference#configtoml
    config_profiles:
      default_profile: setup
      recommended_profiles:
        - setup
        - review
        - release
      role_boundary:
        profiles: operating_modes
        multi_agent_runtime: optional_orchestration_capability
      optional_multi_agent_runtime_keys:
        - features.multi_agent
        - agents.max_threads
        - agents.max_depth
        - agents.job_max_runtime_seconds
      recommended_multi_agent_runtime_baseline:
        features.multi_agent: true
        agents.max_threads: 3
        agents.max_depth: 2
        agents.job_max_runtime_seconds: 900
      multi_agent_runtime_decision_outputs:
        - multi_agent_runtime_enabled
        - multi_agent_runtime_config_mode
        - multi_agent_runtime_config
        - project_local_subagents_desired
        - subagent_flow_trigger
      review_release_extra_keys:
        - plan_mode_reasoning_effort
      optional_hardening_keys:
        - agents.<name>.config_file
        - agents.<name>.description
        - agents.<name>.nickname_candidates
        - mcp_servers.<id>.enabled_tools
        - mcp_servers.<id>.disabled_tools
        - mcp_servers.<id>.required
        - default_permissions
        - permissions.<name>
        - notify
        - shell_environment_policy.*
      not_recommended_by_default:
        - VERSION
        - CHANGELOG.md
        - review_model
        - model_provider
        - openai_base_url
        - provider auth config
        - telemetry / analytics config
    selection_hints:
      - Prefer project-scoped `.codex/config.toml` for repo-local Codex setup.
      - Register the local skill with `[[skills.config]]`.
      - Prefer `profile = "setup"` plus the standard `setup`, `review`, and `release` profiles when the repo wants project-local Codex operating modes.
      - Use only official config keys such as `personality`, `approval_policy`, `sandbox_mode`, `web_search`, `model_reasoning_effort`, and `plan_mode_reasoning_effort` in that baseline.
      - If the interview enables official multi-agent runtime, add the exact baseline `features.multi_agent = true`, `agents.max_threads = 3`, `agents.max_depth = 2`, and `agents.job_max_runtime_seconds = 900`.
      - Keep `setup`, `review`, and `release` as operating modes and keep multi-agent runtime as a separate optional capability layer.
      - Treat `features.multi_agent` and `agents.*` as runtime orchestration config, not as installed subagents.
      - If multi-agent runtime is enabled, the skill may continue into project-local subagent selection only after a second explicit interview decision.
      - If multi-agent runtime stays disabled, project-local subagents may still be selected directly through the existing subagent flow.
      - Use `developer_instructions` only as a thin wrapper, not as a replacement for the skill itself.
      - Use `model_instructions_file` only as an explicit alternative when the repo wants a dedicated instructions file.
      - Keep hardening knobs such as MCP tool filtering, named permissions profiles, notifications, and shell environment policy optional.
      - Do not recommend `VERSION`, `CHANGELOG.md`, `review_model`, custom model providers, provider auth config, or telemetry settings by default.
      - Project-scoped `.codex/config.toml` loads only when the project is trusted.

  - artifact: sosumi-mcp-config
    applies_to: common
    snippet_paths: []
    prerequisites:
      - apple_docs_lookup_requested
      - project_codex_config_in_scope
    install_strategy: configure_remote_http_mcp_server_preferred_stdio_proxy_fallback
    upstream_sources:
      - https://developers.openai.com/codex/config-reference#configtoml
      - https://sosumi.ai
    selection_hints:
      - Prefer remote HTTP MCP with `mcp_servers.sosumi.url = \"https://sosumi.ai/mcp\"`.
      - Use the stdio proxy via `mcp-remote` only when HTTP MCP is not a viable client path.
      - Do not require a global `sosumi` CLI install when MCP already covers the docs use case.

  - artifact: xcode-mcp-config
    applies_to: xcode
    snippet_paths: []
    prerequisites:
      - workspace_shape_is_xcode
      - user_requested_xcode_mcp
      - xcode_external_agents_permission_enabled
      - xcode_project_open_in_xcode
      - tuist_generated_project_open_in_xcode
    install_strategy: configure_xcrun_mcpbridge_after_xcode_permission_enabled
    upstream_sources:
      - https://developers.openai.com/codex/config-reference#configtoml
      - https://developer.apple.com/documentation/xcode/giving-external-agents-access-to-xcode
    selection_hints:
      - Offer only for `xcode` workspaces.
      - Never configure this artifact for `spm` workspaces in this skill.
      - For native `xcodeproj`, require the checked-in project to be open in Xcode.
      - If the selected Xcode strategy is `Tuist`, require `tuist generate` first and open the generated project or workspace in Xcode.
      - Require `Xcode > Settings > Intelligence > Allow external agents to use Xcode tools`.
      - Prefer the Apple-supported `codex mcp add xcode -- xcrun mcpbridge` path or the equivalent TOML config.

  - artifact: gitlint-config
    applies_to: common
    snippet_paths:
      - snippets/common/.gitlint
    target_path: .gitlint
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - gitlint_or_user_confirmed_install
    install_strategy: project_file_with_confirmation_gated_global_tool_install
    upstream_sources: []
    selection_hints:
      - Apply to every repo that uses Git and local commit policy.

  - artifact: spm-swiftlint-config
    applies_to: spm
    snippet_paths:
      - snippets/spm/.swiftlint.yml
    target_path: .swiftlint.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - swift_source_in_scope
      - swiftlint_or_user_confirmed_install
    install_strategy: project_file_with_confirmation_gated_global_tool_install
    upstream_sources: []
    selection_hints:
      - Apply only when Swift source will exist in the target workspace.
      - Use for `spm` workspaces only.
      - Keep the config package-oriented and avoid Xcode-only asset assumptions by default.

  - artifact: xcode-swiftlint-config
    applies_to: xcode
    snippet_paths:
      - snippets/xcode/.swiftlint.yml
    target_path: .swiftlint.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - swift_source_in_scope
      - swiftlint_or_user_confirmed_install
    install_strategy: project_file_with_confirmation_gated_global_tool_install
    upstream_sources: []
    selection_hints:
      - Apply only when Swift source will exist in the target workspace.
      - Use for `xcode` workspaces only.
      - Keep the config app-oriented and include typed asset rules.
      - Share this config across native `xcodeproj` and `Tuist`-generated `Xcode` repositories.

  - artifact: tuist-cli
    applies_to: xcode
    snippet_paths: []
    prerequisites:
      - xcode_project_strategy_is_tuist
      - explicit_confirmation_for_global_install
    install_strategy: propose_tuist_install_with_homebrew_or_optional_mise_pin
    upstream_sources:
      - https://docs.tuist.dev/en/guides/install-tuist
      - https://docs.tuist.dev/en/guides/features/projects/adoption/new-project
    selection_hints:
      - Check only when the selected Xcode strategy is `Tuist`.
      - Prefer the official Homebrew install path for the simplest local setup.
      - Offer `mise use --pin tuist@latest` only when the repo wants a tracked Tuist version.

  - artifact: sfsafesymbols-package
    applies_to: common
    snippet_paths: []
    prerequisites:
      - swift_source_in_scope
      - workspace_shape_chosen
      - user_opted_in_to_sfsafesymbols
    install_strategy: add_spm_dependency_matching_workspace_shape
    upstream_sources:
      - https://github.com/SFSafeSymbols/SFSafeSymbols
    selection_hints:
      - Ask whether typed SF Symbols should be enforced before adding this dependency.
      - Add only when the user explicitly wants SFSafeSymbols in the project.

  - artifact: swiftlint-sfsafesymbols-rule
    applies_to: common
    snippet_paths:
      - snippets/common/.swiftlint.sfsafesymbols.yml
    target_path: .swiftlint.yml
    apply_mode: merge_yaml_fragment
    conflict_policy: ask_before_merge_existing
    merge_strategy: swiftlint_custom_rules_merge_by_key
    prerequisites:
      - swift_source_in_scope
      - user_opted_in_to_sfsafesymbols
      - sfsafesymbols_package_added_or_planned
      - workspace_specific_swiftlint_config_selected
    install_strategy: merge_into_swiftlint_config_when_sfsafesymbols_enabled
    upstream_sources:
      - https://github.com/SFSafeSymbols/SFSafeSymbols
    selection_hints:
      - Skip this rule when the user does not want SFSafeSymbols.
      - Add only together with the SFSafeSymbols package decision.
      - Merge only after the `SPM` or `Xcode` SwiftLint base config is already selected.

  - artifact: gitlint-workflow
    applies_to: common
    snippet_paths:
      - snippets/common/workflows/gitlint.yml
    target_path: .github/workflows/gitlint.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - github_actions_enabled
    install_strategy: copy_from_snippet
    upstream_sources: []
    selection_hints:
      - Apply when the target repository uses GitHub Actions.
      - Include `workflow_dispatch`, least-privilege permissions, and workflow-level concurrency.
      - Lint pushed commit ranges on `push` and proposed commit ranges on `pull_request`.

  - artifact: spm-gitignore
    applies_to: spm
    snippet_paths:
      - snippets/spm/.gitignore
    target_path: .gitignore
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites: []
    install_strategy: copy_from_snippet
    upstream_sources: []

  - artifact: spm-build-workflow
    applies_to: spm
    snippet_paths:
      - snippets/spm/workflows/build.yml
    target_path: .github/workflows/build.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - github_actions_enabled
    install_strategy: copy_from_snippet
    upstream_sources: []
    selection_hints:
      - Keep the workflow package-first.
      - Include `workflow_dispatch`, least-privilege permissions, and workflow-level concurrency.
      - Cache SwiftPM dependency directories rather than arbitrary build outputs.

  - artifact: spm-test-workflow
    applies_to: spm
    snippet_paths:
      - snippets/spm/workflows/test.yml
    target_path: .github/workflows/test.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - github_actions_enabled
    install_strategy: copy_from_snippet
    upstream_sources: []
    selection_hints:
      - Keep the workflow package-first.
      - Include `workflow_dispatch`, least-privilege permissions, and workflow-level concurrency.
      - Cache SwiftPM dependency directories rather than arbitrary build outputs.

  - artifact: xcode-native-gitignore
    applies_to: xcode
    snippet_paths:
      - snippets/xcode/.gitignore
    target_path: .gitignore
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - xcode_project_strategy_is_native
    install_strategy: copy_from_snippet
    upstream_sources: []
    selection_hints:
      - Use only for native checked-in `xcodeproj` repositories.

  - artifact: xcode-native-build-workflow
    applies_to: xcode
    snippet_paths:
      - snippets/xcode/workflows/build.yml
    target_path: .github/workflows/build.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - github_actions_enabled
      - xcode_project_strategy_is_native
    install_strategy: copy_from_snippet
    upstream_sources: []
    selection_hints:
      - Keep the workflow app-first, Xcode-oriented, and native-`xcodeproj` based.
      - Include `workflow_dispatch`, least-privilege permissions, and workflow-level concurrency.
      - Use a repo-local DerivedData path and disable code signing in CI.

  - artifact: xcode-native-test-workflow
    applies_to: xcode
    snippet_paths:
      - snippets/xcode/workflows/test.yml
    target_path: .github/workflows/test.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - github_actions_enabled
      - xcode_project_strategy_is_native
    install_strategy: copy_from_snippet
    upstream_sources: []
    selection_hints:
      - Keep the workflow app-first, Xcode-oriented, and native-`xcodeproj` based.
      - Include `workflow_dispatch`, least-privilege permissions, and workflow-level concurrency.
      - Use a repo-local DerivedData path and disable code signing in CI.

  - artifact: xcode-tuist-gitignore
    applies_to: xcode
    snippet_paths:
      - snippets/xcode-tuist/.gitignore
    target_path: .gitignore
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - xcode_project_strategy_is_tuist
    install_strategy: copy_from_snippet
    upstream_sources:
      - https://docs.tuist.dev/en/guides/features/projects/adoption/new-project
    selection_hints:
      - Use only when the selected Xcode strategy is `Tuist`.
      - Ignore generated Xcode artifacts and Tuist local state.

  - artifact: xcode-tuist-manifests
    applies_to: xcode
    snippet_paths:
      - snippets/xcode-tuist/Project.swift
      - snippets/xcode-tuist/Tuist.swift
    target_path: .
    apply_mode: copy_files_preserving_names
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - xcode_project_strategy_is_tuist
      - tuist_or_user_confirmed_install
    install_strategy: copy_from_snippet
    upstream_sources:
      - https://docs.tuist.dev/en/guides/features/projects/adoption/new-project
      - https://docs.tuist.dev/en/references/project-description/structs/tuist
    selection_hints:
      - Use `Project.swift` and `Tuist.swift` as the repository source of truth for the Xcode project structure.
      - Do not add `Workspace.swift` or `Config.swift` in v1.

  - artifact: xcode-tuist-build-workflow
    applies_to: xcode
    snippet_paths:
      - snippets/xcode-tuist/workflows/build.yml
    target_path: .github/workflows/build.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - github_actions_enabled
      - xcode_project_strategy_is_tuist
    install_strategy: copy_from_snippet
    upstream_sources:
      - https://docs.tuist.dev/en/guides/automate/continuous-integration
    selection_hints:
      - Keep the workflow app-first and Tuist-generated.
      - Include `workflow_dispatch`, least-privilege permissions, and workflow-level concurrency.
      - Install Tuist, run `tuist install`, and then run `tuist build` with an explicit scheme env var.

  - artifact: xcode-tuist-test-workflow
    applies_to: xcode
    snippet_paths:
      - snippets/xcode-tuist/workflows/test.yml
    target_path: .github/workflows/test.yml
    apply_mode: copy_file
    conflict_policy: ask_before_replace_existing_nonempty
    prerequisites:
      - github_actions_enabled
      - xcode_project_strategy_is_tuist
    install_strategy: copy_from_snippet
    upstream_sources:
      - https://docs.tuist.dev/en/guides/automate/continuous-integration
    selection_hints:
      - Keep the workflow app-first and Tuist-generated.
      - Include `workflow_dispatch`, least-privilege permissions, and workflow-level concurrency.
      - Install Tuist, run `tuist install`, and then run `tuist test` with an explicit scheme env var.

  - artifact: community-skills-twostraws
    applies_to: common
    snippet_paths: []
    source_kind: multi_skill_catalog
    skill_categories:
      - ui
      - architecture
      - testing
    prerequisites:
      - project_interview_complete
      - npx_or_user_confirmed_node_install
    install_strategy: skills_sh_preferred_fallback_to_upstream
    upstream_sources:
      - https://skills.sh/twostraws
      - https://github.com/twostraws/Swift-Agent-Skills
    recommendation_mode: one_recommended_choice_user_decides
    selection_hints:
      - Prefer when the project needs ui, architecture, or testing categories this catalog covers.
      - Resolve the concrete skill from inventory/skills.yaml after category selection.
      - Do not install the whole catalog. Recommend one best-fit skill from the matching category.
      - If multiple Twostraws skills fit, recommend one best-fit skill, explain why, and keep the final decision with the user.

