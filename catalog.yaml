      - npx_or_user_confirmed_node_install
    install_strategy: skills_sh_preferred_fallback_to_upstream
    upstream_sources:
      - https://skills.sh/dimillian/skills
    recommendation_mode: one_recommended_choice_user_decides
    selection_hints:
      - Prefer when the project needs package-design, ci-automation, or repo-automation categories this catalog covers.
      - Resolve the concrete skill from inventory/skills.yaml after category selection.
      - Do not install the whole catalog. Recommend one best-fit skill from the matching category.
      - If multiple dimillian skills fit, recommend one best-fit skill, explain why, and keep the final decision with the user.

  - artifact: community-skills-dpearson
    applies_to: common
    snippet_paths: []
    source_kind: multi_skill_catalog
    skill_categories:
      - apple-fallback
      - ui
      - architecture
    prerequisites:
      - project_interview_complete
      - npx_or_user_confirmed_node_install
    install_strategy: skills_sh_preferred_fallback_to_upstream
    upstream_sources:
