name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODE_PROJECT: App.xcodeproj
  XCODE_SCHEME: App
  DESTINATION: platform=iOS Simulator,name=iPhone 16
  DERIVED_DATA_PATH: .build/DerivedData
  SOURCE_PACKAGES_PATH: .build/DerivedData/SourcePackages

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM package checkouts
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ${{ env.SOURCE_PACKAGES_PATH }}
          key: ${{ runner.os }}-xcode-test-${{ hashFiles('**/Package.resolved', '**/*.xcodeproj/project.pbxproj', '**/*.xcworkspace/contents.xcworkspacedata') }}
          restore-keys: |
            ${{ runner.os }}-xcode-test-
            ${{ runner.os }}-xcode-

      - name: Resolve package dependencies
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"

      - name: Run tests
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            test
