name: Test

on:
  push:
  pull_request:

env:
  XCODE_PROJECT: App.xcodeproj
  XCODE_SCHEME: App
  DESTINATION: platform=iOS Simulator,name=iPhone 16

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -destination "$DESTINATION" test
