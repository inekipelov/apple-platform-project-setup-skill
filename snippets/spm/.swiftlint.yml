excluded:
  - .build
  - .swiftpm
  - "**/.swiftpm"
  - Packages

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - literal_expression_end_indentation
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - toggle_bool
  - unused_optional_binding
  - vertical_whitespace_closing_braces
  - discouraged_optional_boolean
  - discouraged_direct_init
  - discouraged_none_name
  - discouraged_optional_collection

custom_rules:
  no_nslocalizedstring:
    name: "No NSLocalizedString"
    regex: '(?m)^(?!\s*//).*\bNSLocalizedString\s*\('
    message: "Use LocalizedStringResource or String(localized:) instead of NSLocalizedString."
    severity: error

  no_bundle_localized_string_lookup:
    name: "No Bundle.localizedString lookup"
    regex: '(?m)^(?!\s*//).*\bBundle\.(?:main|module)\.localizedString\s*\('
    message: "Avoid manual bundle localization lookups."
    severity: error

type_name:
  min_length:
    warning: 2
    error: 0

trailing_comma:
  mandatory_comma: true
