name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore SwiftPM build cache
        if: ${{ runner.debug != '1' }}
        id: restore-build
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-build-${{ github.event.pull_request.base.ref || github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-spm-build-${{ github.event.pull_request.base.ref || github.ref_name }}-
            ${{ runner.os }}-spm-build-

      - name: Swift build
        run: swift build --build-tests

      - name: Save SwiftPM build cache
        if: ${{ runner.debug != '1' && steps.restore-build.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.restore-build.outputs.cache-primary-key }}
