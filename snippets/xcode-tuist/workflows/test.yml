name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TUIST_PROJECT_PATH: .
  TUIST_SCHEME: App
  TUIST_PLATFORM: iOS
  TUIST_DEVICE: iPhone 16
  TUIST_CONFIGURATION: Debug

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Mise and Tuist
        if: ${{ hashFiles('.tool-versions') != '' }}
        uses: jdx/mise-action@v2

      - name: Install Tuist with Homebrew
        if: ${{ hashFiles('.tool-versions') == '' }}
        run: |
          brew tap tuist/tuist
          brew install --formula tuist

      - name: Install project dependencies
        run: tuist install --path "$TUIST_PROJECT_PATH"

      - name: Run tests
        run: |
          tuist test "$TUIST_SCHEME" \
            --path "$TUIST_PROJECT_PATH" \
            --platform "$TUIST_PLATFORM" \
            --device "$TUIST_DEVICE" \
            --configuration "$TUIST_CONFIGURATION"
