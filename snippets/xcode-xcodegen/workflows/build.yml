name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  XCODEGEN_SPEC: project.yml
  XCODE_PROJECT: App.xcodeproj
  XCODE_SCHEME: App
  DESTINATION: generic/platform=iOS Simulator
  DERIVED_DATA_PATH: .build/DerivedData
  SOURCE_PACKAGES_PATH: .build/DerivedData/SourcePackages

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec "$XCODEGEN_SPEC"

      - name: Cache SwiftPM package checkouts
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ${{ env.SOURCE_PACKAGES_PATH }}
          key: ${{ runner.os }}-xcodegen-build-${{ hashFiles('project.yml', '**/Package.resolved', '**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcodegen-build-
            ${{ runner.os }}-xcodegen-

      - name: Resolve package dependencies
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"

      - name: Build app
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            build
