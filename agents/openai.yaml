interface:
  display_name: "Apple Workspace Setup"
  short_description: "Bootstrap Apple workspaces with SPM or Xcode, including native or Tuist-generated Xcode paths, AGENTS guidance, lint, CI, skills, and subagents."
  default_prompt: "Use $apple-platform-project-setup-skill to set up an Apple workspace. Install superpowers first, interview me about the project, choose SPM or Xcode, and if Xcode is chosen keep native xcodeproj as the default unless Tuist is explicitly selected as the Xcode strategy. Ask whether typed SF Symbols should use SFSafeSymbols, resolve the final selected skills and subagents from the inventory-backed comparison flow, configure project .codex/config.toml and optional MCP, allow xcode MCP only for xcode workspaces, require tuist generate before xcode MCP in Tuist repos, prefer sosumi HTTP MCP over the CLI, apply shape-specific SwiftLint and the matching native-or-Tuist GitHub Actions snippets using catalog-defined copy or merge rules, then generate AGENTS.md last as a declarative final-state file that lists only installed skills and subagents."
