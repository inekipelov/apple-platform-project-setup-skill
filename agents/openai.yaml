interface:
  display_name: "Apple Workspace Setup"
  short_description: "Bootstrap Apple workspaces with SPM or Xcode, including native or XcodeGen-generated Xcode paths, AGENTS guidance, lint, CI, skills, and subagents."
  default_prompt: "Use $apple-platform-project-setup-skill to set up or standardize an Apple workspace. First discover which plugins, project-local skills, project-local subagents, and MCP servers are already available, and treat Superpowers as a plugin capability surface rather than a skill install target. Then detect whether the repo is greenfield or already structured, and if it already has structure switch into preserve-first audit-and-align behavior instead of blind bootstrap replacement. Interview me about the project, agent personalization, tooling needs, and whether official multi-agent runtime should be enabled in project .codex/config.toml, then choose or confirm SPM or Xcode. If Xcode is chosen, keep native xcodeproj as the default unless XcodeGen is already detected or XcodeGen is explicitly selected as the Xcode strategy. Ask which communication language should be fixed in AGENTS.md; if the user does not choose one, use the language the client used to contact the agent. If multi-agent runtime is enabled, use the baseline `features.multi_agent = true`, `agents.max_threads = 3`, `agents.max_depth = 2`, and `agents.job_max_runtime_seconds = 900`, then ask separately whether to continue into project-local subagent selection. If multi-agent runtime is not enabled, still ask separately whether project-local subagents are desired directly. Keep profile operating modes separate from runtime multi-agent config. Ask whether typed SF Symbols should use SFSafeSymbols, compare the discovered capability surface against the inventory-backed selection flow, install only missing project-local skills and subagents, configure project .codex/config.toml and optional MCP, prefer the standard setup/review/release profile set when the repo wants project-local Codex config, allow xcode MCP only for xcode workspaces, require xcodegen generate before xcode MCP in XcodeGen repos, compare existing lint and workflow files before replacing them, apply shape-specific SwiftLint and the matching native-or-XcodeGen GitHub Actions snippets using catalog-defined copy or merge rules, then generate AGENTS.md last as a declarative final-state file with a fixed Agent Personalization section, a fixed Skill Usage Order section, and only the installed project-local skills and subagents."
